name: Validate dictionary

on:
  pull_request:
    paths:
      - "data/dictionary.tsv"
      - "scripts/validate.py"
      - ".github/workflows/validate.yml"
  push:
    branches-ignore: [main]
    paths:
      - "data/dictionary.tsv"
      - "scripts/validate.py"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate dictionary.tsv
        run: python scripts/validate.py